<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro de Clientes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Formulario de Registro de Clientes</h1>
    <form id="registroForm" method="post">
        <label for="dni">DNI:</label>
        <input type="text" id="dni" name="dni" >
        <br>

        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required>
        <br>

        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido" required>
        <br>

        <label for="email">Correo Electrónico:</label>
        <input type="email" id="email" name="email" required>
        <br>

        <label for="telefono">Teléfono de Contacto:</label>
        <input type="text" id="telefono" name="telefono" required>
        <br>

        <label for="latitud">Latitud Geográfica:</label>
        <input type="number" id="latitud" name="latitud" step="any" required>
        <br>

        <label for="longitud">Longitud Geográfica:</label>
        <input type="number" id="longitud" name="longitud" step="any" required>
        <br>

        <label for="fechaNacimiento">Fecha de Nacimiento:</label>
        <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
        <br>

        <button type="submit">Registrar Cliente</button>
    </form>
    <button onclick="location.href ='Gestion.html'">Volver al menu principal</button>
    <script src="Clientes.js"></script>
</body>
</html>
