<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Nueva Compra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Registrar Nueva Compra</h1>

    <form id="nuevaCompraForm">
        <label for="productoCodigo">Código del Producto:</label>
        <input type="text" id="productoCodigo" name="productoCodigo" required>
        <br>

        <label for="clienteDni">DNI del Cliente:</label>
        <input type="text" id="clienteDni" name="clienteDni" required>
        <br>

        <label for="cantidad">Cantidad:</label>
        <input type="number" id="cantidad" name="cantidad" required>
        <br>

        <label for="fechaEntrega">Fecha de Entrega Solicitada:</label>
        <input type="date" id="fechaEntrega" name="fechaEntrega" required>
        <br>

        <button type="submit">Registrar Compra</button>
    </form>

    <button onclick="location.href ='Gestion.html'">Volver al menu principal</button>
    <script src="Compras.js"></script>
</body>
</html>
