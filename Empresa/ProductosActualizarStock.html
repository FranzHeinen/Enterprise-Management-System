<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Stock de Producto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Actualizar Stock de Producto</h1>

    <form id="actualizarStockForm">
        <label for="id">Código del Producto:</label>
        <input type="text" id="productoId" name="productoId" required>
        <br>

        <label for="cantidad">Cantidad a Actualizar:</label>
        <input type="number" id="cantidad" name="cantidad" required>
        <br>

        <button type="submit">Actualizar Stock</button>
    </form>
    <button onclick="location.href ='Gestion.html'">Volver al menu principal</button>
    <script src="ProductosActualizarStock.js"></script>
</body>
</html>
